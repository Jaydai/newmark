worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    server {
        listen 80;
        server_name nmrk.jayd.ai;

        location / {
            root /srv/hub;
            try_files $uri $uri.html $uri/ /index.html;
        }

        location /dashboard {
            alias /srv/dashboard;
            try_files $uri $uri.html $uri/ /dashboard/index.html;
        }

        location /commercialisation {
            alias /srv/commercialisation;
            try_files $uri $uri.html $uri/ /commercialisation/index.html;
        }

        location /transactions {
            alias /srv/transactions;
            try_files $uri $uri.html $uri/ /transactions/index.html;
        }

        location /offre-retail {
            alias /srv/offre-retail;
            try_files $uri $uri.html $uri/ /offre-retail/index.html;
        }

        location /visites {
            alias /srv/visites;
            try_files $uri $uri.html $uri/ /visites/index.html;
        }

        location /comparables {
            alias /srv/comparables;
            try_files $uri $uri.html $uri/ /comparables/index.html;
        }

        location /proprietaire {
            alias /srv/proprietaire;
            try_files $uri $uri.html $uri/ /proprietaire/index.html;
        }

        location /encarts {
            alias /srv/encarts;
            try_files $uri $uri.html $uri/ /encarts/index.html;
        }

        location /graphistes {
            alias /srv/graphistes;
            try_files $uri $uri.html $uri/ /graphistes/index.html;
        }

        location /api/cu5/ {
            proxy_pass http://cu5-agent:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 1800s;
        }

        location /api/cu1/ {
            proxy_pass http://cu1-agent:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 1800s;
        }

        location /api/cu4/ {
            proxy_pass http://cu4-agent:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 1800s;
        }
    }
}
